scan_timeout = 100
command_timeout = 500

"$schema" = "https://starship.rs/config-schema.json"

follow_symlinks = false
add_newline = false

# Set the theme palette
palette = 'catppuccin_macchiato' # Options: kanagawa_wave, kanagawa_dragon, kanagawa_lotus

format = """
Ō×£\
$directory\
${custom.giturl}\
$git_branch\
${custom.git_worktree}\
$git_status\
$line_break\
$character\
"""

right_format = """
$all
"""

[directory]
style = "sapphire"
format = "[ $path ]($style)"
truncation_length = 4

